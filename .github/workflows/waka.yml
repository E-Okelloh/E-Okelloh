name: Waka Readme

on:
  schedule:
    # Runs at 12 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # Optional: Customize output
          # SHOW_TITLE: true
          # TIME_RANGE: last_7_days
          # SHOW_TIME: true   
